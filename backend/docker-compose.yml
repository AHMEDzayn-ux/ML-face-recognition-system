version: "3.8"

services:
  face-recognition:
    build: .
    container_name: face-recognition-dev
    volumes:
      # Mount current directory to /app in container
      - .:/app
      # Persist model cache (DeepFace downloads models on first run)
      - model-cache:/root/.deepface
    working_dir: /app
    stdin_open: true
    tty: true
    command: /bin/bash

volumes:
  model-cache:
